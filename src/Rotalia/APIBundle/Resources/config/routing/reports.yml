RotaliaAPI_reports_list:
    path:  /reports/
    methods: [GET]
    defaults: { _controller: Rotalia\APIBundle\Controller\ReportsController::ListAction }

RotaliaAPI_reports_get:
    path:  /reports/{id}/
    methods: [GET]
    defaults: { _controller: Rotalia\APIBundle\Controller\ReportsController::GetAction }

RotaliaAPI_reports_create:
    path:  /reports/
    methods: [POST]
    defaults: { _controller: Rotalia\APIBundle\Controller\ReportsController::PostAction }

RotaliaAPI_reports_update:
    path:  /reports/{id}/
    methods: [PATCH]
    defaults: { _controller: Rotalia\APIBundle\Controller\ReportsController::PatchAction }
